<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>报废差异查询条件</title>
    <style>
      body {
        box-sizing: border-box;
        margin: 0;
        padding: 18px;
        font-family: "Microsoft YaHei", Arial, sans-serif;
        color: #1f2933;
        background: #f7f8fa;
      }

      .grid {
        display: grid;
        grid-template-columns: 88px 1fr;
        gap: 10px 12px;
        align-items: center;
      }

      .grid > label,
      .field-label {
        font-size: 14px;
        text-align: right;
      }

      .text-input {
        box-sizing: border-box;
        width: 100%;
        height: 30px;
        border: 1px solid #c9d1d9;
        border-radius: 4px;
        padding: 4px 8px;
        font-size: 14px;
        background: #fff;
      }

      .direction-group {
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 30px;
        margin: 0;
        padding: 0;
        border: 0;
      }

      .direction-option {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 14px;
        white-space: nowrap;
        cursor: pointer;
      }

      .direction-option input {
        margin: 0;
      }

      .direction-group.disabled {
        color: #7b8794;
      }

      .direction-group.disabled .direction-option {
        cursor: not-allowed;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 18px;
      }

      button {
        min-width: 72px;
        height: 30px;
        border: 1px solid #9aa4b2;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
      }

      button.primary {
        border-color: #087f5b;
        background: #099268;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <form id="queryForm">
      <div class="grid">
        <label for="company">公司简称</label>
        <input id="company" class="text-input" name="company" autocomplete="off">
        <label for="dept1">一级部门</label>
        <input id="dept1" class="text-input" name="dept1" autocomplete="off">
        <label for="dept2">二级部门</label>
        <input id="dept2" class="text-input" name="dept2" autocomplete="off">
        <label for="startDate">开始日期</label>
        <input id="startDate" class="text-input" name="startDate" placeholder="2026/5/1" autocomplete="off">
        <label for="endDate">结束日期</label>
        <input id="endDate" class="text-input" name="endDate" placeholder="2026/5/31" autocomplete="off">
        <div id="queryDirectionLabel" class="field-label">查询方向</div>
        <fieldset id="queryDirectionGroup" class="direction-group" aria-labelledby="queryDirectionLabel">
          <label class="direction-option">
            <input type="radio" name="queryDirection" value="OA金蝶单号查ERP" checked>
            <span>OA金蝶单号查ERP</span>
          </label>
          <label class="direction-option">
            <input type="radio" name="queryDirection" value="ERP源单查OA">
            <span>ERP源单查OA</span>
          </label>
        </fieldset>
      </div>
      <div class="actions">
        <button id="btnQuery" class="primary" type="submit">查询</button>
        <button id="btnClear" type="button">清空</button>
        <button id="btnCancel" type="button">取消</button>
      </div>
    </form>
    <script src="./query-dialog.js"></script>
  </body>
</html>
